<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" role="img" aria-labelledby="title desc">
  <title id="title">VS Code-like web terminal architecture</title>
  <desc id="desc">The web bash shell path uses ttyd with direct bash by default, while tmux remains optional.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title{font:800 26px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .label{font:700 18px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .small{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#475569}
      .mono{font:500 14px IBM Plex Mono,Consolas,monospace;fill:#d1fae5}
      .card{fill:#fff;stroke:#cbd5e1;filter:url(#shadow)}
      .line{stroke:#64748b;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="500" rx="28" fill="#f8fafc"/>
  <text x="60" y="58" class="title">Web Bash now follows the VS Code terminal path</text>
  <text x="60" y="86" class="small">Direct shell first. Fewer repaint layers. tmux stays available when users explicitly need detachable sessions.</text>

  <rect x="70" y="145" width="230" height="150" rx="22" class="card"/>
  <text x="185" y="184" text-anchor="middle" class="label">Browser</text>
  <text x="185" y="210" text-anchor="middle" class="small">xterm.js in ttyd UI</text>
  <rect x="105" y="235" width="160" height="34" rx="10" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="185" y="257" text-anchor="middle" class="small">Cascadia / Consolas</text>

  <rect x="390" y="145" width="230" height="150" rx="22" class="card"/>
  <text x="505" y="184" text-anchor="middle" class="label">ttyd</text>
  <text x="505" y="210" text-anchor="middle" class="small">WebSocket bridge</text>
  <rect x="425" y="235" width="160" height="34" rx="10" fill="#dcfce7" stroke="#86efac"/>
  <text x="505" y="257" text-anchor="middle" class="small">clean renderer options</text>

  <rect x="710" y="145" width="230" height="150" rx="22" class="card"/>
  <text x="825" y="184" text-anchor="middle" class="label">bash --login</text>
  <text x="825" y="210" text-anchor="middle" class="small">simple prompt + ASCII</text>
  <rect x="745" y="235" width="160" height="34" rx="10" fill="#fef9c3" stroke="#fde68a"/>
  <text x="825" y="257" text-anchor="middle" class="small">tmux optional</text>

  <path class="line" d="M300 220 H380"/>
  <path class="line" d="M620 220 H700"/>

  <rect x="90" y="350" width="1000" height="92" rx="18" fill="url(#panel)" filter="url(#shadow)"/>
  <circle cx="120" cy="378" r="7" fill="#ef4444"/>
  <circle cx="144" cy="378" r="7" fill="#f59e0b"/>
  <circle cx="168" cy="378" r="7" fill="#22c55e"/>
  <text x="120" y="412" class="mono">/workspace $ python train.py</text>
  <rect x="343" y="398" width="10" height="20" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.15;1" dur="1.3s" repeatCount="indefinite"/>
  </rect>

  <rect x="760" y="340" width="260" height="42" rx="14" fill="url(#blue)"/>
  <text x="890" y="367" text-anchor="middle" font-family="IBM Plex Sans,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#fff">lower repaint risk</text>
</svg>
