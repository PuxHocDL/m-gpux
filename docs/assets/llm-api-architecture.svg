<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">LLM API server architecture</title>
  <desc id="desc">A Modal GPU container exposes an auth proxy on port 8000 and forwards validated requests to a vLLM backend on port 8001.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="gpu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="proxy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="vllm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowWhite" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#e2e8f0"/>
    </marker>
    <style>
      .title{font:800 27px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .label{font:800 19px IBM Plex Sans,Segoe UI,sans-serif;fill:#fff}
      .darkLabel{font:800 18px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .small{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#475569}
      .light{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#dbeafe}
      .mono{font:600 13px IBM Plex Mono,Consolas,monospace;fill:#e0f2fe}
      .line{stroke:#334155;stroke-width:2.8;fill:none;marker-end:url(#arrow)}
      .lineLight{stroke:#e2e8f0;stroke-width:2.6;fill:none;marker-end:url(#arrowWhite)}
    </style>
  </defs>
  <rect width="1180" height="620" rx="30" fill="url(#bg)"/>
  <text x="60" y="58" class="title">LLM API server: fast auth edge, heavy model backend</text>
  <text x="60" y="88" class="small">One Modal GPU container runs two processes so Modal sees a healthy web server before vLLM finishes loading.</text>

  <rect x="70" y="170" width="190" height="130" rx="24" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="165" y="210" text-anchor="middle" class="darkLabel">Clients</text>
  <text x="165" y="237" text-anchor="middle" class="small">OpenAI SDK</text>
  <text x="165" y="260" text-anchor="middle" class="small">curl / apps / agents</text>

  <rect x="360" y="122" width="750" height="395" rx="32" fill="url(#gpu)" filter="url(#shadow)"/>
  <text x="735" y="165" text-anchor="middle" font-family="IBM Plex Sans,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#f8fafc">Modal Container (GPU)</text>
  <text x="735" y="190" text-anchor="middle" class="light">single deployment, shared localhost network, shared GPU memory</text>

  <rect x="410" y="235" width="285" height="195" rx="24" fill="url(#proxy)" stroke="#bfdbfe" stroke-opacity="0.45"/>
  <text x="552" y="275" text-anchor="middle" class="label">Auth Proxy</text>
  <text x="552" y="300" text-anchor="middle" class="mono">FastAPI + uvicorn :8000</text>
  <text x="446" y="336" class="light">- Bearer token auth</text>
  <text x="446" y="361" class="light">- 401 / 403 / 429 responses</text>
  <text x="446" y="386" class="light">- streaming proxy</text>
  <text x="446" y="411" class="light">- health + stats endpoints</text>

  <rect x="790" y="235" width="270" height="195" rx="24" fill="url(#vllm)" stroke="#bbf7d0" stroke-opacity="0.55"/>
  <text x="925" y="275" text-anchor="middle" class="label">vLLM Backend</text>
  <text x="925" y="300" text-anchor="middle" class="mono">OpenAI API :8001</text>
  <text x="826" y="336" class="light">- /v1/chat/completions</text>
  <text x="826" y="361" class="light">- /v1/completions</text>
  <text x="826" y="386" class="light">- /v1/models</text>
  <text x="826" y="411" class="light">- model loading + serving</text>

  <path class="line" d="M260 235 H350"/>
  <text x="305" y="218" text-anchor="middle" class="small">HTTPS :8000</text>
  <path class="lineLight" d="M695 332 H780"/>
  <text x="737" y="315" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="12" fill="#e2e8f0">localhost</text>

  <rect x="410" y="462" width="650" height="34" rx="12" fill="#020617" opacity="0.42"/>
  <text x="735" y="484" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="13" fill="#e2e8f0">Modal web_server exposes only proxy port 8000; backend port 8001 stays internal.</text>

  <rect x="705" y="540" width="168" height="42" rx="14" fill="#fff" stroke="#cbd5e1"/>
  <text x="789" y="566" text-anchor="middle" class="small">HF cache volume</text>
  <rect x="895" y="540" width="168" height="42" rx="14" fill="#fff" stroke="#cbd5e1"/>
  <text x="979" y="566" text-anchor="middle" class="small">vLLM cache volume</text>
  <path class="line" d="M790 540 C790 510 860 492 914 438"/>
  <path class="line" d="M980 540 C980 510 970 486 943 438"/>
</svg>
