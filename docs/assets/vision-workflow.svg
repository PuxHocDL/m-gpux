<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="500" viewBox="0 0 1180 500" role="img" aria-labelledby="title desc">
  <title id="title">Vision workflow</title>
  <desc id="desc">Vision commands validate data, train a model on Modal GPUs, store artifacts, and reuse checkpoints for prediction, evaluation, and export.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .title{font:800 26px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .label{font:800 17px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .small{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#475569}
      .mono{font:600 12px IBM Plex Mono,Consolas,monospace;fill:#334155}
      .card{fill:#fff;stroke:#cbd5e1;filter:url(#shadow)}
      .line{stroke:#475569;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="500" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" class="title">Vision training workflow</text>
  <text x="60" y="86" class="small">A complete loop: create data, train, persist artifacts, evaluate, predict, and export.</text>

  <rect x="70" y="155" width="170" height="126" rx="22" class="card"/>
  <text x="155" y="192" text-anchor="middle" class="label">Dataset</text>
  <text x="155" y="220" text-anchor="middle" class="small">train / val / test</text>
  <text x="155" y="244" text-anchor="middle" class="mono">sample-data optional</text>

  <rect x="310" y="155" width="170" height="126" rx="22" class="card"/>
  <text x="395" y="192" text-anchor="middle" class="label">Train</text>
  <text x="395" y="220" text-anchor="middle" class="small">TorchVision model</text>
  <text x="395" y="244" text-anchor="middle" class="mono">Modal GPU</text>

  <rect x="550" y="135" width="190" height="166" rx="24" fill="#0f172a" filter="url(#shadow)"/>
  <text x="645" y="176" text-anchor="middle" font-family="IBM Plex Sans,Segoe UI,sans-serif" font-size="18" font-weight="800" fill="#fff">Artifact Volume</text>
  <text x="645" y="210" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="12" fill="#cbd5e1">best_model.pt</text>
  <text x="645" y="234" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="12" fill="#cbd5e1">summary.json</text>
  <text x="645" y="258" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="12" fill="#cbd5e1">labels.json</text>

  <rect x="825" y="110" width="150" height="90" rx="20" class="card"/>
  <text x="900" y="145" text-anchor="middle" class="label">Predict</text>
  <text x="900" y="171" text-anchor="middle" class="small">new images</text>

  <rect x="825" y="220" width="150" height="90" rx="20" class="card"/>
  <text x="900" y="255" text-anchor="middle" class="label">Evaluate</text>
  <text x="900" y="281" text-anchor="middle" class="small">metrics report</text>

  <rect x="825" y="330" width="150" height="90" rx="20" class="card"/>
  <text x="900" y="365" text-anchor="middle" class="label">Export</text>
  <text x="900" y="391" text-anchor="middle" class="small">ONNX / TorchScript</text>

  <path class="line" d="M240 218 H300"/>
  <path class="line" d="M480 218 H540"/>
  <path class="line" d="M740 218 C790 218 785 155 815 155"/>
  <path class="line" d="M740 218 H815"/>
  <path class="line" d="M740 218 C790 218 785 375 815 375"/>

  <rect x="175" y="372" width="460" height="46" rx="15" fill="#7c2d12" opacity="0.9"/>
  <text x="405" y="401" text-anchor="middle" font-family="IBM Plex Sans,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#ffedd5">The checkpoint becomes the handoff point for every downstream command.</text>
</svg>
