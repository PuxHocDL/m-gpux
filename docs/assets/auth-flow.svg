<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Auth proxy request flow</title>
  <desc id="desc">Request flow through public endpoints, bearer token validation, concurrency guard, proxy retry, and response streaming.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .title{font:800 26px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .label{font:800 16px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .small{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#475569}
      .mono{font:600 12px IBM Plex Mono,Consolas,monospace;fill:#334155}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;filter:url(#shadow)}
      .decision{fill:#fef3c7;stroke:#f59e0b;stroke-width:1.5;filter:url(#shadow)}
      .ok{fill:#dcfce7;stroke:#22c55e;stroke-width:1.5;filter:url(#shadow)}
      .bad{fill:#ffe4e6;stroke:#fb7185;stroke-width:1.5;filter:url(#shadow)}
      .line{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1180" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="58" class="title">Auth proxy flow</text>
  <text x="60" y="86" class="small">Small, explicit gates make API behavior predictable under bad keys, overload, and slow model startups.</text>

  <rect x="70" y="180" width="170" height="84" rx="18" class="box"/>
  <text x="155" y="215" text-anchor="middle" class="label">Request</text>
  <text x="155" y="240" text-anchor="middle" class="mono">/v1/... or /health</text>

  <path class="line" d="M240 222 H300"/>
  <rect x="310" y="160" width="180" height="124" rx="18" class="decision"/>
  <text x="400" y="199" text-anchor="middle" class="label">Public path?</text>
  <text x="400" y="225" text-anchor="middle" class="small">/health, /docs, /stats</text>
  <text x="400" y="250" text-anchor="middle" class="mono">skip API key</text>

  <path class="line" d="M490 222 H555"/>
  <rect x="565" y="160" width="170" height="124" rx="18" class="decision"/>
  <text x="650" y="199" text-anchor="middle" class="label">Bearer key?</text>
  <text x="650" y="225" text-anchor="middle" class="small">missing -> 401</text>
  <text x="650" y="250" text-anchor="middle" class="small">wrong -> 403</text>

  <path class="line" d="M735 222 H800"/>
  <rect x="810" y="160" width="180" height="124" rx="18" class="decision"/>
  <text x="900" y="199" text-anchor="middle" class="label">Capacity?</text>
  <text x="900" y="225" text-anchor="middle" class="small">in-flight guard</text>
  <text x="900" y="250" text-anchor="middle" class="mono">over limit -> 429</text>

  <path class="line" d="M900 284 V338"/>
  <rect x="810" y="350" width="180" height="92" rx="18" class="ok"/>
  <text x="900" y="385" text-anchor="middle" class="label">Proxy to vLLM</text>
  <text x="900" y="411" text-anchor="middle" class="small">retry with backoff</text>

  <path class="line" d="M810 396 H735"/>
  <rect x="565" y="350" width="170" height="92" rx="18" class="ok"/>
  <text x="650" y="385" text-anchor="middle" class="label">Stream chunks</text>
  <text x="650" y="411" text-anchor="middle" class="small">SSE preserved</text>

  <path class="line" d="M565 396 H490"/>
  <rect x="310" y="350" width="180" height="92" rx="18" class="ok"/>
  <text x="400" y="385" text-anchor="middle" class="label">Track metrics</text>
  <text x="400" y="411" text-anchor="middle" class="small">latency, status, tokens</text>

  <path class="line" d="M310 396 H240"/>
  <rect x="70" y="350" width="170" height="92" rx="18" class="box"/>
  <text x="155" y="385" text-anchor="middle" class="label">Response</text>
  <text x="155" y="411" text-anchor="middle" class="small">JSON or event-stream</text>

  <rect x="565" y="40" width="425" height="54" rx="18" class="bad"/>
  <text x="777" y="73" text-anchor="middle" class="small">Invalid traffic exits early; expensive GPU backend stays protected.</text>
  <path class="line" d="M650 160 C650 118 710 98 777 94"/>
</svg>
