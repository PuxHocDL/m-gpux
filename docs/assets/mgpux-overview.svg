<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">m-gpux system overview</title>
  <desc id="desc">A high level overview showing the user, m-gpux CLI, local configuration, generated Modal templates, and Modal GPU services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .label{font:700 18px IBM Plex Sans,Segoe UI,sans-serif;fill:#0f172a}
      .small{font:500 13px IBM Plex Sans,Segoe UI,sans-serif;fill:#475569}
      .tiny{font:500 12px IBM Plex Mono,Consolas,monospace;fill:#64748b}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;filter:url(#shadow)}
      .soft{fill:#f8fafc;stroke:#dbe4ef;stroke-width:1}
      .line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .accent{fill:url(#primary)}
    </style>
  </defs>
  <rect width="1180" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1015" cy="80" r="110" fill="#bae6fd" opacity="0.35"/>
  <circle cx="120" cy="440" r="120" fill="#ccfbf1" opacity="0.45"/>

  <text x="60" y="62" class="label" font-size="28">m-gpux turns local intent into Modal GPU workloads</text>
  <text x="60" y="90" class="small">Profiles, generated scripts, cloud runtimes, billing, and stop flows stay in one guided CLI.</text>

  <rect x="60" y="150" width="190" height="160" rx="20" class="card"/>
  <circle cx="155" cy="205" r="36" class="accent"/>
  <text x="155" y="211" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="24" font-weight="700" fill="#fff">&gt;_</text>
  <text x="155" y="260" text-anchor="middle" class="label">Developer</text>
  <text x="155" y="284" text-anchor="middle" class="small">CLI or VS Code</text>

  <rect x="320" y="130" width="240" height="200" rx="24" class="card"/>
  <text x="440" y="166" text-anchor="middle" class="label">m-gpux CLI</text>
  <rect x="350" y="190" width="180" height="32" rx="10" class="soft"/>
  <text x="440" y="211" text-anchor="middle" class="tiny">account / hub / host</text>
  <rect x="350" y="232" width="180" height="32" rx="10" class="soft"/>
  <text x="440" y="253" text-anchor="middle" class="tiny">serve / vision / video</text>
  <rect x="350" y="274" width="180" height="32" rx="10" class="soft"/>
  <text x="440" y="295" text-anchor="middle" class="tiny">billing / stop / load</text>

  <rect x="640" y="128" width="210" height="82" rx="18" class="card"/>
  <text x="745" y="162" text-anchor="middle" class="label">Local State</text>
  <text x="745" y="187" text-anchor="middle" class="tiny">~/.modal.toml + API keys</text>

  <rect x="640" y="248" width="210" height="82" rx="18" class="card"/>
  <text x="745" y="282" text-anchor="middle" class="label">Generated Script</text>
  <text x="745" y="307" text-anchor="middle" class="tiny">modal_runner.py</text>

  <rect x="930" y="110" width="200" height="260" rx="26" class="card"/>
  <text x="1030" y="148" text-anchor="middle" class="label">Modal Cloud</text>
  <rect x="960" y="175" width="140" height="34" rx="11" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1030" y="197" text-anchor="middle" class="tiny">GPU runtimes</text>
  <rect x="960" y="220" width="140" height="34" rx="11" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="1030" y="242" text-anchor="middle" class="tiny">Web endpoints</text>
  <rect x="960" y="265" width="140" height="34" rx="11" fill="#fefce8" stroke="#fde68a"/>
  <text x="1030" y="287" text-anchor="middle" class="tiny">Volumes + cache</text>
  <rect x="960" y="310" width="140" height="34" rx="11" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="1030" y="332" text-anchor="middle" class="tiny">Cost + lifecycle</text>

  <path class="line" d="M250 230 H315"/>
  <path class="line" d="M560 168 H628"/>
  <path class="line" d="M560 288 H628"/>
  <path class="line" d="M850 289 C884 289 890 240 925 240"/>

  <rect x="315" y="390" width="540" height="58" rx="18" fill="#0f172a" opacity="0.92"/>
  <text x="585" y="416" text-anchor="middle" font-family="IBM Plex Mono,Consolas,monospace" font-size="15" font-weight="700" fill="#e2e8f0">m-gpux hub  ->  choose profile  ->  choose GPU  ->  launch</text>
  <text x="585" y="438" text-anchor="middle" font-family="IBM Plex Sans,Segoe UI,sans-serif" font-size="13" fill="#93c5fd">transparent scripts, editable before execution</text>
</svg>
