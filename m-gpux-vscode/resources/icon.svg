<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2ecf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00d4ff" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Outer glow border -->
  <rect x="4" y="4" width="248" height="248" rx="44" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>

  <!-- GPU Chip Body -->
  <rect x="58" y="58" width="140" height="140" rx="12" fill="url(#chip)" stroke="url(#glow)" stroke-width="2.5" filter="url(#outerGlow)"/>

  <!-- Chip pins - top -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.7">
    <line x1="85" y1="58" x2="85" y2="38"/>
    <line x1="108" y1="58" x2="108" y2="38"/>
    <line x1="128" y1="58" x2="128" y2="38"/>
    <line x1="148" y1="58" x2="148" y2="38"/>
    <line x1="171" y1="58" x2="171" y2="38"/>
  </g>
  <!-- Chip pins - bottom -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.7">
    <line x1="85" y1="198" x2="85" y2="218"/>
    <line x1="108" y1="198" x2="108" y2="218"/>
    <line x1="128" y1="198" x2="128" y2="218"/>
    <line x1="148" y1="198" x2="148" y2="218"/>
    <line x1="171" y1="198" x2="171" y2="218"/>
  </g>
  <!-- Chip pins - left -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.7">
    <line x1="58" y1="85" x2="38" y2="85"/>
    <line x1="58" y1="108" x2="38" y2="108"/>
    <line x1="58" y1="128" x2="38" y2="128"/>
    <line x1="58" y1="148" x2="38" y2="148"/>
    <line x1="58" y1="171" x2="38" y2="171"/>
  </g>
  <!-- Chip pins - right -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.7">
    <line x1="198" y1="85" x2="218" y2="85"/>
    <line x1="198" y1="108" x2="218" y2="108"/>
    <line x1="198" y1="128" x2="218" y2="128"/>
    <line x1="198" y1="148" x2="218" y2="148"/>
    <line x1="198" y1="171" x2="218" y2="171"/>
  </g>

  <!-- Pin end dots -->
  <g fill="url(#glow)" opacity="0.9">
    <!-- top -->
    <circle cx="85" cy="35" r="2.5"/><circle cx="108" cy="35" r="2.5"/><circle cx="128" cy="35" r="2.5"/><circle cx="148" cy="35" r="2.5"/><circle cx="171" cy="35" r="2.5"/>
    <!-- bottom -->
    <circle cx="85" cy="221" r="2.5"/><circle cx="108" cy="221" r="2.5"/><circle cx="128" cy="221" r="2.5"/><circle cx="148" cy="221" r="2.5"/><circle cx="171" cy="221" r="2.5"/>
    <!-- left -->
    <circle cx="35" cy="85" r="2.5"/><circle cx="35" cy="108" r="2.5"/><circle cx="35" cy="128" r="2.5"/><circle cx="35" cy="148" r="2.5"/><circle cx="35" cy="171" r="2.5"/>
    <!-- right -->
    <circle cx="221" cy="85" r="2.5"/><circle cx="221" cy="108" r="2.5"/><circle cx="221" cy="128" r="2.5"/><circle cx="221" cy="148" r="2.5"/><circle cx="221" cy="171" r="2.5"/>
  </g>

  <!-- Inner die -->
  <rect x="78" y="78" width="100" height="100" rx="6" fill="#0a0a14" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>

  <!-- Circuit traces inside die -->
  <g stroke="#00d4ff" stroke-width="0.8" opacity="0.3">
    <line x1="88" y1="88" x2="88" y2="168"/>
    <line x1="103" y1="88" x2="103" y2="168"/>
    <line x1="118" y1="88" x2="118" y2="168"/>
    <line x1="138" y1="88" x2="138" y2="168"/>
    <line x1="153" y1="88" x2="153" y2="168"/>
    <line x1="168" y1="88" x2="168" y2="168"/>
    <line x1="88" y1="98" x2="168" y2="98"/>
    <line x1="88" y1="113" x2="168" y2="113"/>
    <line x1="88" y1="128" x2="168" y2="128"/>
    <line x1="88" y1="143" x2="168" y2="143"/>
    <line x1="88" y1="158" x2="168" y2="158"/>
  </g>

  <!-- "M" letter - neon style -->
  <text x="128" y="142" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="52" fill="url(#glow)" text-anchor="middle" filter="url(#neon)">M</text>

  <!-- Small "GPU" text below -->
  <text x="128" y="162" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#00d4ff" text-anchor="middle" letter-spacing="4" opacity="0.8">GPU</text>

  <!-- Sparkle dots -->
  <circle cx="92" cy="92" r="1.5" fill="#ff2ecf" opacity="0.8"/>
  <circle cx="164" cy="92" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="92" cy="164" r="1.5" fill="#7b2fff" opacity="0.8"/>
  <circle cx="164" cy="164" r="1.5" fill="#ff2ecf" opacity="0.8"/>
</svg>
